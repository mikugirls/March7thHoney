syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "AssistMonsterEntityInfo.proto";
import "DynamicValues.proto";
import "MotionInfo.proto";
import "SkillExtraTag.proto";

message SceneCastSkillCsReq {
    repeated uint32 hit_target_entity_id_list = 1;
    uint32 attacked_by_entity_id = 2;
    repeated AssistMonsterEntityInfo assist_monster_entity_info = 3;
    string maze_ability_str = 4;
    uint32 cast_entity_id = 5;
    uint32 JJABNMFLKKI = 6;
    MotionInfo target_motion = 7;
    uint32 skill_index = 8;
    repeated uint32 assist_monster_entity_id_list = 9;
    repeated DynamicValues dynamic_values = 13;
    repeated SkillExtraTag skill_extra_tags = 14;
}
