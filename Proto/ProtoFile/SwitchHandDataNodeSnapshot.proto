syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "MotionInfoSnapshot.proto";

message SwitchHandDataNodeSnapshot {
    uint32 config_id = 1;
    MotionInfoSnapshot hand_transform = 2;
    uint32 hand_state = 3;
    bytes hand_param = 4;
    uint32 get_coin_count = 5;
}
