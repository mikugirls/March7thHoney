syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "MusicRhythmGroup.proto";
import "MusicRhythmLevel.proto";

message MusicRhythmDataScRsp {
    repeated MusicRhythmLevel level_data_list = 1;
    repeated uint32 unlock_phase_list = 3;
    bool show_hint = 5;
    repeated uint32 unlock_track_list = 6;
    repeated MusicRhythmGroup music_group = 8;
    uint32 retcode = 10;
    uint32 cur_level_id = 11;
    repeated uint32 unlock_song_list = 12;
    uint32 cur_song_id = 14;
}
