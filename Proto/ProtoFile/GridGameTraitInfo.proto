syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "GridFightTraitEffectInfo.proto";

message GridGameTraitInfo {
    uint32 KINIKFCKGDF = 1;
    repeated GridFightTraitEffectInfo trait_effect_list = 4;
    uint32 DFNCFOKPMCJ = 6;
    uint32 NKFDBEHPNLG = 12;
    uint32 trait_id = 13;
    repeated uint32 grid_fight_trait_member_unique_id_list = 14;
}
