syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



message SceneSummonUnitInfo {
    uint32 caster_entity_id = 1;
    repeated string trigger_name_list = 3;
    uint64 create_time_ms = 5;
    int32 life_time_ms = 7;
    uint32 attach_entity_id = 8;
    uint32 summon_unit_id = 15;
}
