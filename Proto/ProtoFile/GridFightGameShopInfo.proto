syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "FJPONJFLOOH.proto";
import "GridFightShopGoodsInfo.proto";

message GridFightGameShopInfo {
    uint32 NDGMCJHKNIN = 1;
    repeated uint32 DNOIFMMLJDN = 2;
    uint32 GLIFNMBMMBL = 3;
    FJPONJFLOOH LDEDGOOKHFL = 4;
    bool shop_is_locked = 8;
    repeated GridFightShopGoodsInfo shop_goods_list = 10;
}
