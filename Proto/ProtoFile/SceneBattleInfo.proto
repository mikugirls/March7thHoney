syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "BattleAvatar.proto";
import "BattleBuff.proto";
import "BattleEventBattleInfo.proto";
import "BattleGridFightSpecialBattleInfo.proto";
import "BattleRogueMagicInfo.proto";
import "BattleTargetList.proto";
import "CAKGOGMEJOF.proto";
import "KCGPMNNKIKN.proto";
import "MLDEDCCOHBF.proto";
import "OGEOMDJIAGI.proto";
import "SceneMonsterWave.proto";

message SceneBattleInfo {
    uint32 battle_id = 1;
    uint32 stage_id = 2;
    bool EODHMOBOENG = 3;
    repeated SceneMonsterWave monster_wave_list = 4;
    uint32 world_level = 6;
    uint32 logic_random_seed = 8;
    repeated BattleAvatar battle_avatar_list = 9;
    repeated BattleBuff buff_list = 13;
    uint32 rounds_limit = 14;
    uint32 monster_wave_length = 15;
    repeated BattleEventBattleInfo battle_event = 234;
    CAKGOGMEJOF IAJDCJIAHFP = 508;
    BattleRogueMagicInfo battle_rogue_magic_info = 558;
    map<uint32, BattleTargetList> battle_target_info = 761;
    KCGPMNNKIKN GDAGHIJADOD = 838;
    MLDEDCCOHBF OBOFOCPCBPK = 1383;
    BattleGridFightSpecialBattleInfo FMCJPPILPLL = 1654;
    OGEOMDJIAGI AFCMOOFGBPK = 1831;
}
