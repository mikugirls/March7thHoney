syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "MotionInfo.proto";
import "SceneActorInfo.proto";
import "SceneNpcInfo.proto";
import "SceneNpcMonsterInfo.proto";
import "ScenePropInfo.proto";
import "SceneSummonUnitInfo.proto";

message SceneEntityInfo {
    uint32 inst_id = 4;
    MotionInfo motion = 12;
    uint32 group_id = 13;
    uint32 entity_id = 14;
    oneof entity {
        SceneActorInfo actor = 1;
        ScenePropInfo prop = 3;
        SceneNpcInfo npc = 8;
        SceneNpcMonsterInfo npc_monster = 9;
        SceneSummonUnitInfo summon_unit = 11;
    }
}
