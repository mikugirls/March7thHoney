syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "BigDataRecommendType.proto";
import "EBJDMKPDCNK.proto";
import "EquipmentRecommend.proto";
import "RelicRecommend.proto";

message GetBigDataRecommendScRsp {
    uint32 equip_avatar = 4;
    bool has_recommand = 6;
    uint32 retcode = 7;
    BigDataRecommendType big_data_recommend_type = 15;
    oneof recommend_type {
        RelicRecommend relic_recommend = 2;
        EquipmentRecommend equipment_recommend = 12;
        EBJDMKPDCNK GIJOGKBMDIP = 14;
    }
}
