syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "ItemList.proto";
import "SceneMonster.proto";
import "SceneMonsterWaveParam.proto";

message SceneMonsterWave {
    uint32 battle_stage_id = 3;
    repeated SceneMonster monster_list = 6;
    repeated ItemList PIBLJLBCKJL = 9;
    SceneMonsterWaveParam monster_param = 12;
    uint32 battle_wave_id = 14;
}
