syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "FNONPMBOFNE.proto";
import "FateMasterStatusType.proto";

message BDDBAKBOMKP {
    int32 max_hp = 1;
    FateMasterStatusType status = 2;
    uint32 avatar_id = 4;
    repeated FNONPMBOFNE IAKFPMOEJLF = 5;
    int32 hp = 9;
    uint32 rank = 11;
}
