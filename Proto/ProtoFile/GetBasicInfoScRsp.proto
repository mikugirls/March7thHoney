syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "PlayerSettingInfo.proto";

message GetBasicInfoScRsp {
    bool is_gender_set = 2;
    uint32 gender = 4;
    PlayerSettingInfo player_setting_info = 5;
    uint32 cur_day = 7;
    int64 next_recover_time = 8;
    uint32 gameplay_birthday = 10;
    uint32 week_cocoon_finished_count = 11;
    uint32 exchange_times = 12;
    uint32 retcode = 13;
    int64 last_set_nickname_time = 14;
}
