syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "DisplayAvatarInfo.proto";
import "EEBPHJCNBFO.proto";

message ChallengePeakBossClearance {
    uint32 MALOCIMPJPM = 3;
    repeated EEBPHJCNBFO FMFGOJHCCNL = 4;
    repeated uint32 peak_avatar_id_list = 5;
    bool has_passed = 9;
    uint32 buff_id = 10;
    uint32 best_cycle_count = 11;
    uint32 HEILKBJCAGB = 13;
    repeated DisplayAvatarInfo DisplayAvatar = 14;
    repeated uint32 OHOMDMEJLFK = 15;
}
