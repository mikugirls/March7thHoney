syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "DDJIOFONKME.proto";
import "DIBJGAKOCLO.proto";
import "GridFightBossInfo.proto";
import "GridFightGamePortalBuffInfo.proto";
import "GridFightLayerInfo.proto";
import "IKFEDFBLOOG.proto";
import "OPBCCOLPDPC.proto";

message GridFightLevelInfo {
    repeated uint32 grid_fight_affix_list = 1;
    GridFightBossInfo boss_info = 2;
    uint32 DCPKPNLKGMM = 3;
    repeated OPBCCOLPDPC HGAHMIPIBLO = 4;
