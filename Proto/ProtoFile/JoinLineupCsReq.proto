syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "AvatarType.proto";
import "ExtraLineupType.proto";

message JoinLineupCsReq {
    uint32 index = 1;
    AvatarType avatar_type = 4;
    bool is_virtual = 7;
    uint32 plane_id = 8;
    ExtraLineupType extra_lineup_type = 10;
    uint32 slot = 13;
    uint32 base_avatar_id = 14;
}
