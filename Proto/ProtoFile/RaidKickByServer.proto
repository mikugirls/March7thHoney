syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "AANCGOFCJJL.proto";
import "LineupInfo.proto";
import "SceneInfo.proto";

message RaidKickByServer {
    SceneInfo scene = 2;
    uint32 raid_id = 3;
    LineupInfo lineup = 4;
    AANCGOFCJJL reason = 11;
    uint32 world_level = 14;
}
