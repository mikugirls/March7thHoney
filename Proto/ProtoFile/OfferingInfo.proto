syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "OfferingState.proto";

message OfferingInfo {
    uint32 total_exp = 1;
    uint32 offering_level = 4;
    repeated uint32 has_taken_reward_id_list = 6;
    uint32 offering_id = 7;
    uint32 level_exp = 12;
    OfferingState offering_state = 14;
}
