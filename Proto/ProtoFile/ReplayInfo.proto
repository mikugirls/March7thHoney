syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "OCLEJLEFBFO.proto";

message ReplayInfo {
    uint64 PNLCMJOADKB = 1;
    OCLEJLEFBFO replay_type = 2;
    uint32 stage_id = 3;
    uint32 uid = 4;
    string nickname = 5;
    uint32 head_icon = 6;
    string replay_name = 7;
    uint64 create_time = 8;
    uint32 DAFEJIENABL = 9;
    uint32 KALAGIBCNAO = 10;
}
