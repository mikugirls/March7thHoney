syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "DLFOGJGCCGP.proto";
import "FJCDAKICFKA.proto";
import "HeliobusChallengeData.proto";
import "HeliobusChallengeLineup.proto";

message HeliobusActivityDataScRsp {
    repeated HeliobusChallengeLineup CHGNKDNFNLF = 1;
    uint32 IMBOKGFIACA = 2;
    uint32 level = 3;
    uint32 retcode = 4;
    uint32 phase = 5;
    uint32 DKOGNOKOPKG = 9;
    repeated HeliobusChallengeData challenge_list = 10;
    uint32 GCDLCPMFLMH = 11;
    FJCDAKICFKA skill_info = 12;
    repeated DLFOGJGCCGP LPMIHBLOIAK = 15;
}
