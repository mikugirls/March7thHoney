        GridFightHandBookAugmentInfo handbook_grid_fight_augment_info = 900;
        GridFightHandBookRoleInfo handbook_grid_fight_role_info = 944;
        GridFightHandBookEquipInfo handbook_grid_fight_equip_info = 1614;
