syntax = "proto3";

option csharp_namespace = "March7thHoney.Proto";



import "HitMonsterBattleInfo.proto";
import "SceneBattleInfo.proto";

message SceneCastSkillScRsp {
    SceneBattleInfo battle_info = 1;
    repeated HitMonsterBattleInfo monster_battle_info = 2;
    uint32 cast_entity_id = 4;
    uint32 retcode = 6;
}
